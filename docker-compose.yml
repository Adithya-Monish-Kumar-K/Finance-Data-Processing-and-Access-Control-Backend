version: "3.8"

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/finance.db
      - JWT_SECRET=docker-dev-secret-change-me
      - JWT_REFRESH_SECRET=docker-dev-refresh-secret-change-me
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
